<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agendamentos — Painel Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<link href="../../css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-md navbar-barbearia py-3">
    <div class="container">
        <a class="navbar-brand-custom" href="dashboard.html">
            <span class="brand-mark">✂</span> Barbearia Gsz <span class="mono text-muted-custom" style="font-size: .7rem; margin-left: .4rem;">ADMIN</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain" style="border-color: var(--line);">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navMain">
            <ul class="navbar-nav align-items-md-center gap-1">
                <li class="nav-item"><a class="nav-link" href="dashboard.html">Painel</a></li>
                <li class="nav-item"><a class="nav-link active" href="agendamentos.html">Agendamentos</a></li>
                <li class="nav-item"><a class="nav-link" href="profissionais.html">Profissionais</a></li>
                <li class="nav-item"><a class="nav-link" href="pagamentos.html">Pagamentos</a></li>
                <li class="nav-item mt-2 mt-md-0 ms-md-3">
                    <button class="btn btn-outline-brass btn-sm" onclick="logout()">Sair</button>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-5">
    <span class="section-label">Todos os clientes</span>
    <h1 class="h2 mb-4">Agendamentos</h1>

    <div id="alertBox" class="alert-barbearia alert-danger-custom p-3 mb-3 d-none"></div>

    <div class="table-responsive">
        <table class="table align-middle" style="color: var(--text);">
            <thead>
                <tr class="mono text-muted-custom" style="font-size: .78rem; text-transform: uppercase; letter-spacing: .04em;">
                    <th>Data</th>
                    <th>Cliente</th>
                    <th>Profissional</th>
                    <th>Serviço</th>
                    <th>Valor</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="tabelaAgendamentos" style="border-color: var(--line);">
                <tr><td colspan="6" class="text-muted-custom">Carregando...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="d-flex justify-content-between align-items-center mt-3">
        <span class="text-muted-custom mono" id="paginaInfo" style="font-size: .85rem;"></span>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-brass btn-sm" id="btnAnterior">← Anterior</button>
            <button class="btn btn-outline-brass btn-sm" id="btnProxima">Próxima →</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="../../js/config.js"></script>
<script src="../../js/auth.js"></script>
<script src="../../js/admin-api.js"></script>
<script src="../../js/admin-agendamentos.js"></script>
</body>
</html>
