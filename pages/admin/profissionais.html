<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profissionais — Painel Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<link href="../../css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-md navbar-barbearia py-3">
    <div class="container">
        <a class="navbar-brand-custom" href="dashboard.html">
            <span class="brand-mark">✂</span> Barbearia Gsz <span class="mono text-muted-custom" style="font-size: .7rem; margin-left: .4rem;">ADMIN</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain" style="border-color: var(--line);">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navMain">
            <ul class="navbar-nav align-items-md-center gap-1">
                <li class="nav-item"><a class="nav-link" href="dashboard.html">Painel</a></li>
                <li class="nav-item"><a class="nav-link" href="agendamentos.html">Agendamentos</a></li>
                <li class="nav-item"><a class="nav-link active" href="profissionais.html">Profissionais</a></li>
                <li class="nav-item mt-2 mt-md-0 ms-md-3">
                    <button class="btn btn-outline-brass btn-sm" onclick="logout()">Sair</button>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-end flex-wrap gap-3 mb-4">
        <div>
            <span class="section-label">Equipe</span>
            <h1 class="h2 mb-0">Profissionais</h1>
        </div>
        <button class="btn btn-brass" data-bs-toggle="modal" data-bs-target="#modalNovoProfissional">+ Cadastrar profissional</button>
    </div>

    <div id="alertBox" class="alert-barbearia alert-danger-custom p-3 mb-3 d-none"></div>

    <div class="row g-3" id="listaProfissionais">
        <div class="text-muted-custom">Carregando...</div>
    </div>
</div>

<!-- Modal cadastrar profissional -->
<div class="modal fade" id="modalNovoProfissional" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content" style="background: var(--bg-elevated); border: 1px solid var(--line); color: var(--text);">
            <div class="modal-header" style="border-color: var(--line);">
                <h5 class="modal-title">Cadastrar novo profissional</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
            </div>
            <form id="formNovoProfissional">
                <div class="modal-body form-barbearia">
                    <div id="modalAlertBox" class="alert-barbearia alert-danger-custom p-3 mb-3 d-none"></div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="nome">Nome completo</label>
                            <input type="text" class="form-control" id="nome" required minlength="3">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="email">E-mail</label>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="telefone">Telefone</label>
                            <input type="text" class="form-control" id="telefone" required placeholder="(11) 99999-0000">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="senha">Senha de acesso</label>
                            <input type="password" class="form-control" id="senha" required minlength="6" placeholder="Mínimo 6 caracteres">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="especialidades">Especialidades</label>
                        <input type="text" class="form-control" id="especialidades" placeholder="Ex: Corte masculino, Barba, Sobrancelha">
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="horarioInicio">Início do expediente</label>
                            <input type="time" class="form-control" id="horarioInicio" value="08:00" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="horarioFim">Fim do expediente</label>
                            <input type="time" class="form-control" id="horarioFim" value="20:00" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="comissaoPercentual">Comissão (%)</label>
                            <input type="number" class="form-control" id="comissaoPercentual" value="50" min="0" max="100" step="0.01" required>
                        </div>
                    </div>
                </div>
                <div class="modal-footer" style="border-color: var(--line);">
                    <button type="button" class="btn btn-outline-brass" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-brass" id="btnSalvarProfissional">Cadastrar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="../../js/config.js"></script>
<script src="../../js/auth.js"></script>
<script src="../../js/admin-api.js"></script>
<script src="../../js/admin-profissionais.js"></script>
</body>
</html>
